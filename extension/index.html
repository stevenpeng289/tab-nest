<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TabNest</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <!-- Animated Background -->
  <div class="mesh-background" id="meshBackground"></div>




  <!-- ================================================================
       HEADER — greeting on the left
       ================================================================ -->
  <header>
    <div class="header-left">
      <!-- "Good afternoon" — written by getGreeting() in app.js -->
      <h1 id="greeting"></h1>
      <!-- "Friday, April 4, 2026" — written by getDateDisplay() in app.js -->
      <div class="date" id="dateDisplay"></div>
    </div>
  </header>

  <section class="quick-links-section" id="quickLinksSection">
    <div class="quick-links-shell">
      <div class="quick-links-header">
        <div class="quick-links-heading">
          <h2 id="quickLinksTitle"></h2>
          <p class="quick-links-subtitle" id="quickLinksSubtitle"></p>
        </div>
      </div>
      <div class="quick-links-grid" id="quickLinksGrid"></div>
    </div>
  </section>

  <!-- ================================================================
       TABNEST DUPES BANNER — appears when you have extra TabNest tabs open
       Hidden by default; app.js shows it when dupeTabOutCount > 1
       ================================================================ -->
  <div class="tab-cleanup-banner" id="tabOutDupeBanner" style="display:none">
    <div class="tab-cleanup-left">
      <div class="tab-cleanup-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 0 1-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 0 1 1.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 0 0-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 0 1-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 0 0-3.375-3.375h-1.5a1.125 1.125 0 0 1-1.125-1.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H9.75" />
        </svg>
      </div>
      <div class="tab-cleanup-text" id="tabOutDupeText"></div>
    </div>
    <button class="tab-cleanup-btn" data-action="close-tabout-dupes" id="closeTabOutDupesBtn"></button>
  </div>

  <!-- ================================================================
       MAIN CONTENT AREA — two-column layout
       Left: open tabs (domain/mission cards)
       Right: saved for later checklist
       The right column only renders when it has items (JS controls this)
       ================================================================ -->
  <div class="dashboard-columns" id="dashboardColumns">

    <!-- LEFT COLUMN: Open tabs -->
    <div class="active-section" id="openTabsSection" style="display:none">
      <div class="section-header">
        <h2 id="openTabsSectionTitle"></h2>
        <div class="section-line"></div>
        <div class="section-tools">
          <div class="view-switcher" id="openTabsViewSwitcher" aria-label="Open tabs view">
            <button type="button" class="view-switcher-btn" data-action="set-open-tabs-view" data-view="domains" id="openTabsDomainViewBtn"></button>
            <button type="button" class="view-switcher-btn" data-action="set-open-tabs-view" data-view="windows" id="openTabsWindowViewBtn"></button>
          </div>
          <div class="section-count" id="openTabsSectionCount"></div>
        </div>
      </div>
      <div class="missions" id="openTabsMissions"></div>
      <div class="window-groups" id="openTabsWindows" style="display:none"></div>
    </div>

    <!-- RIGHT COLUMN: Saved for Later checklist -->
    <div class="deferred-column" id="deferredColumn" style="display:none">
      <section class="sidebar-section deferred-section-shell" id="deferredSection" style="display:none">
        <div class="section-header">
          <h2 id="deferredSectionTitle"></h2>
          <div class="section-line"></div>
          <div class="section-count" id="deferredCount"></div>
        </div>

        <!-- Active checklist items — injected by renderDeferredList() in app.js -->
        <div class="deferred-list" id="deferredList"></div>

        <!-- Empty state — shown when no active deferred tabs -->
        <div class="deferred-empty" id="deferredEmpty" style="display:none"></div>

        <!-- Archive section — collapsed by default -->
        <div class="deferred-archive" id="deferredArchive" style="display:none">
          <button class="archive-toggle" id="archiveToggle">
            <svg class="archive-chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" /></svg>
            <span id="archiveToggleLabel"></span>
            <span class="archive-count" id="archiveCount"></span>
          </button>
          <div class="archive-body" id="archiveBody" style="display:none">
            <input type="text" class="archive-search" id="archiveSearch">
            <div class="archive-list" id="archiveList"></div>
          </div>
        </div>
      </section>
    </div>

  </div><!-- end .dashboard-columns -->

  <!-- ================================================================
       FOOTER — global stats + refresh control
       ================================================================ -->
  <footer>
    <div class="footer-stats">
      <div class="stat">
        <div class="stat-num" id="statTabs">—</div>
        <div class="stat-label" id="statTabsLabel"></div>
      </div>
    </div>
    <div class="footer-credit-card">
      <div class="footer-credit-eyebrow" id="footerCreditEyebrow"></div>
      <div class="footer-credit-main" id="footerCreditMain"></div>
      <div class="footer-credit-links">
        <a id="footerProjectLink" href="https://github.com/zarazhangrui/tab-out" target="_top" rel="noopener noreferrer"></a>
        <a id="footerAuthorLink" href="https://github.com/zarazhangrui" target="_top" rel="noopener noreferrer"></a>
      </div>
    </div>
  </footer>

</div><!-- end .container -->

<input type="file" id="backgroundImageInput" class="sr-only" accept="image/*">

<div class="floating-tools" id="floatingTools">
  <div class="floating-tool-popovers">
    <div class="stash-menu" id="stashMenu" style="display:none">
      <div class="stash-menu-header">
        <div>
          <div class="stash-menu-title" id="stashMenuTitle"></div>
          <p class="stash-menu-hint" id="stashMenuHint"></p>
        </div>
        <button type="button" class="stash-menu-close" data-action="toggle-stash-menu" aria-label="Close">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.9" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="m6 18 12-12M6 6l12 12" />
          </svg>
        </button>
      </div>
      <div class="stash-menu-actions">
        <button type="button" class="stash-action-card" data-action="stash-current-window" id="stashCurrentWindowBtn"></button>
        <button type="button" class="stash-action-card" data-action="stash-all-windows" id="stashAllWindowsBtn"></button>
      </div>
    </div>

    <div class="session-panel" id="sessionPanel" style="display:none">
      <div class="session-panel-header">
        <div class="session-panel-heading">
          <h3 id="sessionsSectionTitle"></h3>
        </div>
        <button type="button" class="session-panel-close" data-action="toggle-session-panel" aria-label="Close">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.9" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="m6 18 12-12M6 6l12 12" />
          </svg>
        </button>
      </div>
      <div class="session-panel-meta-row">
        <p class="session-panel-subtitle" id="sessionsEmpty"></p>
        <span class="section-count" id="sessionsCount"></span>
      </div>
      <div class="sessions-list" id="sessionsList"></div>
    </div>
  </div>

  <div class="floating-tools-dock">
    <button type="button" class="floating-tool-btn floating-tool-btn-theme" data-action="toggle-color-theme" id="themeToggleBtn" aria-pressed="false">
      <span class="floating-tool-icon floating-tool-theme-icon floating-tool-theme-icon-sun" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.85" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25M12 18.75V21M4.954 4.954 6.546 6.546M17.454 17.454l1.592 1.592M3 12h2.25M18.75 12H21M4.954 19.046l1.592-1.592M17.454 6.546l1.592-1.592M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
        </svg>
      </span>
      <span class="floating-tool-icon floating-tool-theme-icon floating-tool-theme-icon-moon" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.85" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79Z" />
        </svg>
      </span>
      <span class="sr-only" id="themeToggleState"></span>
    </button>

    <div class="floating-tools-rail" id="floatingToolsRail">
      <button type="button" class="floating-tool-btn floating-tool-btn-stash" data-action="toggle-stash-menu" id="stashMenuTrigger" aria-expanded="false" aria-controls="stashMenu">
        <span class="floating-tool-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.85" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 8.25h15" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M5.25 9.75v6.75A1.5 1.5 0 0 0 6.75 18h10.5a1.5 1.5 0 0 0 1.5-1.5V9.75" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 4.5 12 7.5l3-3" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 7.5v5.25" />
          </svg>
        </span>
      </button>
      <button type="button" class="floating-tool-btn floating-tool-btn-session" data-action="toggle-session-panel" id="sessionFabTrigger" aria-expanded="false" aria-controls="sessionPanel">
        <span class="floating-tool-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.85" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 15.75h15" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M5.25 15v1.5A1.5 1.5 0 0 0 6.75 18h10.5a1.5 1.5 0 0 0 1.5-1.5V15" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 11.25 12 8.25l3 3" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 8.25V3.75" />
          </svg>
        </span>
        <span class="floating-tool-badge" id="sessionFabCount" hidden></span>
      </button>
    </div>

    <button type="button" class="floating-tool-btn floating-tool-btn-settings" data-action="open-settings-modal" id="settingsModalTrigger">
      <span class="floating-tool-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.85" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" d="M5 7.25h5.2" />
          <path stroke-linecap="round" d="M14.8 7.25H19" />
          <path stroke-linecap="round" d="M5 12h3.7" />
          <path stroke-linecap="round" d="M13.3 12H19" />
          <path stroke-linecap="round" d="M5 16.75h8.2" />
          <path stroke-linecap="round" d="M17.8 16.75H19" />
          <circle cx="12.5" cy="7.25" r="2.3" />
          <circle cx="11" cy="12" r="2.3" />
          <circle cx="15.5" cy="16.75" r="2.3" />
        </svg>
      </span>
    </button>
  </div>
</div>

<div class="settings-modal-backdrop" id="settingsModalBackdrop" style="display:none">
  <div class="settings-modal" role="dialog" aria-modal="true" aria-labelledby="settingsModalTitle">
    <div class="settings-modal-header">
      <h3 id="settingsModalTitle"></h3>
      <button type="button" class="settings-modal-close" data-action="close-settings-modal" id="settingsModalCloseBtn"></button>
    </div>
    <div class="settings-modal-body">
      <aside class="settings-nav" id="settingsNav">
        <button type="button" class="settings-nav-item" data-action="show-settings-panel" data-settings-panel="appearance" id="settingsAppearanceTab"></button>
        <button type="button" class="settings-nav-item" data-action="show-settings-panel" data-settings-panel="links" id="settingsLinksTab"></button>
      </aside>
      <div class="settings-content">
        <section class="settings-panel" data-settings-panel="appearance">
          <div class="settings-group">
            <div class="settings-group-label" id="settingsLanguageLabel"></div>
            <div class="settings-language-switcher" id="settingsLanguageSwitcher" role="group">
              <button type="button" class="settings-language-option" data-action="set-language" data-language="zh-CN">中</button>
              <button type="button" class="settings-language-option" data-action="set-language" data-language="en-US">EN</button>
            </div>
          </div>
          <div class="settings-group">
            <div class="settings-group-label" id="settingsBackgroundLabel"></div>
            <p class="settings-group-copy" id="settingsBackgroundHint"></p>
            <div class="settings-background-grid">
              <div class="settings-background-block" id="settingsImageUploadBlock">
                <div class="settings-background-subtitle" id="settingsImageUploadLabel"></div>
                <div class="settings-action-row settings-background-actions">
                  <button type="button" class="action-btn save-tabs settings-upload-trigger" data-action="choose-background-image" id="backgroundImageTriggerBtn"></button>
                  <button type="button" class="action-btn danger settings-reset-trigger" data-action="clear-background-image" id="backgroundImageClearBtn" hidden></button>
                </div>
              </div>
            </div>
          </div>
        </section>
        <section class="settings-panel" data-settings-panel="links" style="display:none">
          <div class="settings-group">
            <div class="settings-group-label" id="settingsLinkOpenModeLabel"></div>
            <p class="settings-group-copy" id="settingsLinkOpenModeHint"></p>
            <div class="settings-choice-list" id="settingsLinkOpenModeChoices">
              <button type="button" class="settings-choice" data-action="set-quick-link-open-mode" data-open-mode="current-tab" id="settingsOpenModeCurrentBtn"></button>
              <button type="button" class="settings-choice" data-action="set-quick-link-open-mode" data-open-mode="new-tab" id="settingsOpenModeNewBtn"></button>
            </div>
          </div>
        </section>
      </div>
    </div>
  </div>
</div>

<!-- ================================================================
     TOAST — floats above everything, used for action confirmations
     Hidden by default via CSS (opacity:0, translateY)
     ================================================================ -->
<div class="toast" id="toast">
  <!-- Checkmark circle icon (Heroicons outline) -->
  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
  </svg>
  <span id="toastText"></span>
</div>

<div class="quick-link-modal-backdrop" id="quickLinkModalBackdrop" style="display:none">
  <div class="quick-link-modal" role="dialog" aria-modal="true" aria-labelledby="quickLinkModalTitle">
    <div class="quick-link-modal-header">
      <h3 id="quickLinkModalTitle"></h3>
      <button type="button" class="quick-link-modal-close" data-action="close-quick-link-modal" id="quickLinkModalCloseBtn"></button>
    </div>
    <form class="quick-link-form" id="quickLinkForm">
      <input type="hidden" id="quickLinkId">
      <label class="quick-link-field">
        <span id="quickLinkNameLabel"></span>
        <input type="text" id="quickLinkNameInput" maxlength="40" required>
      </label>
      <label class="quick-link-field">
        <span id="quickLinkUrlLabel"></span>
        <input type="text" id="quickLinkUrlInput" inputmode="url" required>
      </label>
      <div class="quick-link-form-actions">
        <button type="button" class="action-btn" data-action="close-quick-link-modal" id="quickLinkCancelBtn"></button>
        <button type="submit" class="action-btn primary" id="quickLinkSubmitBtn"></button>
      </div>
    </form>
  </div>
</div>

<!-- Boot loader: tries config.local.js first, then loads app.js -->
<script src="boot.js"></script>
</body>
</html>
